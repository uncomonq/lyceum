{% extends 'base.html' %}
{% load i18n %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
<h1 class="mb-4">{{ page_title }}</h1>

{% for item in items %}
  {% ifchanged item.category_id %}
    <h2 class="mb-3">{{ item.category.name }}</h2>
  {% endifchanged %}
  {% include 'includes/item_card.html' %}
{% endfor %}
{% endblock %}
