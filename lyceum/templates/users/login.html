{% extends "base.html" %}
{% load i18n %}

{% block content %}
  <h2>{% trans "Login" %}</h2>
  <form method="post">
    {% csrf_token %}
    {% include "includes/form_fields.html" with form=form %}
    <button type="submit" class="btn btn-primary">{% trans "Login" %}</button>
  </form>
  <p class="mt-3"><a href="{% url 'users:password_reset' %}">{% trans "Forgot password?" %}</a></p>
{% endblock %}
